name: Daily BTC Telegram Report

on:
  # GitHub의 schedule(cron) 트리거는 무료 계정에서 우선순위가 낮아 몇 시간씩
  # 지연되는 게 알려진 한계라, 외부 크론 서비스(cron-job.org)가 정확한 시각에
  # 아래 workflow_dispatch API를 직접 호출하는 방식으로 대체했다.
  workflow_dispatch: {}

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run report script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_btc_report.py
